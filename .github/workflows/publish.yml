name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Verify publish secrets
        run: |
          test -n "$ORG_GRADLE_PROJECT_mavenCentralUsername"
          test -n "$ORG_GRADLE_PROJECT_mavenCentralPassword"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKey"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKeyPassword"

      - name: Publish to Maven Central
        run: ./gradlew :luma:publishAndReleaseToMavenCentral --stacktrace --console=plain
