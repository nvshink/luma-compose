name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Validate Android targets
        run: ./gradlew :luma:compileAndroidMain :android-demo:assembleDebug --stacktrace --console=plain
